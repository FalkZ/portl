<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var connection = new WebSocket("ws://localhost:8080");

      const cbs = [];
      const freeIDs = [];
      window.id = freeIDs;

      connection.onopen = function() {
        window.portl = new Proxy(
          {},
          {
            get: (target, key, proxy) => (...args) => ({
              _setID: function(cb) {
                let id = freeIDs.shift();
                if (id !== undefined) {
                  cbs[id] = cb;
                } else {
                  id = cbs.push(cb) - 1;
                }
                this.id = id;
              },
              then: function(cb) {
                this._setID(cb);
                connection.send(
                  JSON.stringify({ fn: key, once: true, args, id: this.id })
                );
              },

              subscribe: function(cb) {
                this._setID(cb);
                connection.send(
                  JSON.stringify({ fn: key, once: false, args, id: this.id })
                );
              },
              unsubscribe: function() {
                console.log(this);
                connection.send(
                  JSON.stringify({ fn: key, done: true, id: this.id })
                );
              }
            })
          }
        );
      };

      const unsubscribeID = (id) => {
        freeIDs.push(id);
        cbs[id] = () => {};
      };

      connection.onmessage = function({ data }) {
        const { id, ret, once, done } = JSON.parse(data);
        if (done) {
          unsubscribeID(id);
        } else {
          cbs[id](ret);
          if (once) {
            unsubscribeID(id);
          }
        }
      };

      connection.onerror = function(error) {
        console.log("WebSocket Error " + error);
      };
    </script>
  </body>
</html>
